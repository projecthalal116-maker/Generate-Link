<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generator Link Undangan</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Poppins', 'sans-serif'],
          },
          colors: {
            emerald: {
              800: '#065f46',
              900: '#064e3b',
            },
            gold: {
              500: '#f59e0b',
              600: '#d97706',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased p-4 md:p-8 flex items-center justify-center min-h-screen">

  <div class="w-full max-w-lg bg-white p-6 md:p-8 rounded-3xl shadow-xl border border-slate-100">
    
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-emerald-100 text-emerald-700 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
      </div>
      <h1 class="text-2xl font-bold text-emerald-900">Generator Link</h1>
      <p class="text-slate-500 text-sm mt-1">Buat link undangan khusus untuk setiap tamu</p>
    </div>

    <!-- Form -->
    <div class="space-y-5">
      
      <!-- Base URL -->
      <div>
        <label class="block text-sm font-semibold mb-1 text-slate-700">Link Utama Undangan</label>
        <p class="text-xs text-slate-500 mb-2">Pastikan ini adalah link tempat undangan Anda di-hosting.</p>
        <input type="text" id="baseUrl" value="https://projecthalal116-maker.github.io/Undangan-Halal-Bihalal/" class="w-full px-4 py-3 rounded-xl border border-slate-300 bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-emerald-600 transition-colors text-sm">
      </div>

      <!-- Guest Name(s) -->
      <div>
        <label class="block text-sm font-semibold mb-1 text-slate-700">Daftar Nama Tamu</label>
        <p class="text-xs text-slate-500 mb-2">Masukkan nama tamu, satu nama per baris (tekan Shift-Enter untuk nama berikutnya).</p>
        <textarea id="guestNames" rows="5" placeholder="Bapak Budi&#10;Keluarga Andi&#10;Siti Aminah" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-emerald-600 transition-colors leading-relaxed"></textarea>
      </div>

      <!-- Generate Button -->
      <button onclick="generateLink()" class="w-full bg-emerald-800 hover:bg-emerald-900 text-white font-semibold px-6 py-3.5 rounded-xl shadow-md transition-all hover:-translate-y-0.5 mt-2">
        Generate Link
      </button>

    </div>

    <!-- Result Section (Hidden by default) -->
    <div id="resultSection" class="mt-8 pt-8 border-t border-slate-100 hidden">
      <div class="flex justify-between items-center mb-4">
        <label class="block text-sm font-semibold text-slate-700">Link Berhasil Dibuat!</label>
      </div>
      
      <!-- Container untuk list link yang terpisah -->
      <div id="linksContainer" class="space-y-3 max-h-96 overflow-y-auto pr-2" style="scrollbar-width: thin;">
        <!-- Link akan di-generate di sini oleh JS -->
      </div>

      <!-- Toast Notification (Hidden by default) -->
      <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-4 py-2 rounded-lg shadow-lg text-sm opacity-0 transition-opacity duration-300 pointer-events-none z-50">
        Link berhasil disalin!
      </div>
    </div>

  </div>

  <script>
    // Fungsi untuk membuat link
    function generateLink() {
      var baseUrl = document.getElementById('baseUrl').value.trim();
      var guestNamesText = document.getElementById('guestNames').value;

      if (!baseUrl) {
        alert("Mohon isi Link Utama Undangan.");
        return;
      }

      if (!guestNamesText.trim()) {
        alert("Mohon masukkan minimal satu Nama Tamu.");
        return;
      }

      // Hapus tanda / di akhir baseUrl jika ada, agar rapi
      if (baseUrl.endsWith('/')) {
        baseUrl = baseUrl.slice(0, -1);
      }

      // Pisahkan teks berdasarkan baris baru (Enter)
      var names = guestNamesText.split('\n');
      var container = document.getElementById('linksContainer');
      container.innerHTML = ''; // Kosongkan hasil sebelumnya

      for (var i = 0; i < names.length; i++) {
        var name = names[i].trim();
        if (name) { // Jika baris tidak kosong
          var encodedName = encodeURIComponent(name);
          var finalUrl = baseUrl + "?to=" + encodedName;
          
          // Buat elemen HTML untuk setiap link
          var itemDiv = document.createElement('div');
          itemDiv.className = "bg-emerald-50 p-4 rounded-xl border border-emerald-100";
          itemDiv.innerHTML = `
            <p class="text-xs font-semibold text-emerald-900 mb-2">Kepada Yth. ${name}</p>
            <div class="flex items-center gap-2">
              <input type="text" id="link-${i}" readonly value="${finalUrl}" class="flex-1 px-3 py-2 rounded-lg border border-emerald-200 bg-white text-slate-600 text-sm focus:outline-none">
              <button onclick="copySingleLink('link-${i}', this)" class="bg-gold-500 hover:bg-gold-600 text-white p-2 rounded-lg shadow-sm transition-colors flex-shrink-0" title="Copy Link">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
              </button>
            </div>
          `;
          container.appendChild(itemDiv);
        }
      }

      // Tampilkan hasil
      document.getElementById('resultSection').classList.remove('hidden');
    }

    // Fungsi untuk menyalin link individual ke clipboard
    function copySingleLink(elementId, btnElement) {
      var copyText = document.getElementById(elementId);
      copyText.select();
      copyText.setSelectionRange(0, 99999); // Untuk perangkat mobile

      try {
        // Coba menggunakan API Clipboard modern
        document.execCommand('copy');
        
        // Ubah tampilan tombol menjadi centang hijau
        btnElement.classList.remove('bg-gold-500', 'hover:bg-gold-600');
        btnElement.classList.add('bg-emerald-600', 'hover:bg-emerald-700');
        btnElement.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>';
        btnElement.title = "Sudah Dicopy!";

        // Tampilkan notifikasi (Toast)
        var toast = document.getElementById("toast");
        toast.classList.remove("opacity-0");
        setTimeout(function(){ toast.classList.add("opacity-0"); }, 2000);
      } catch (err) {
        alert("Gagal menyalin link. Silakan salin manual.");
      }
    }
  </script>
</body>
</html>
